      --wp-card-bg: #1a1610;
      --wp-card-border: rgba(255, 140, 0, 0.15);

      --wp-tag-bg: rgba(255, 170, 0, 0.08);
      --wp-tag-border: rgba(255, 170, 0, 0.15);
    }

    .wp-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem 2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .wp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1.5rem 0 1rem;
      border-bottom: 1px solid rgba(188, 19, 254, 0.12);
      margin-bottom: 1.5rem;
    }

    .wp-header h2 {
      color: var(--neon-cyan);
      font-size: 1.1rem;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .wp-header h2 span {
      color: var(--text-secondary);
      font-weight: 400;
    }

    .wp-nav {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .wp-nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.8rem;
      padding: 0.35rem 0.75rem;
      border: 1px solid rgba(188, 19, 254, 0.2);
      border-radius: 4px;
      transition: all 0.2s;
    }

    .wp-nav a:hover {
      color: var(--neon-cyan);
      border-color: var(--neon-cyan);
      box-shadow: 0 0 10px rgba(0, 240, 252, 0.15);
    }

    .wp-controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
      align-items: center;
    }

    .wp-filters {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .wp-filter-btn {
      background: var(--wp-filter-bg);
      border: 1px solid rgba(188, 19, 254, 0.2);
      color: var(--text-secondary);
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.25s;
    }

    .wp-filter-btn:hover {
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
    }

    .wp-filter-btn.active {
      background: var(--wp-filter-active);
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
      box-shadow: 0 0 12px rgba(0, 240, 252, 0.15);
    }

    .wp-search {
      flex: 1;
      min-width: 200px;
      max-width: 340px;
      background: var(--wp-card-bg);
      border: 1px solid rgba(188, 19, 254, 0.15);
      color: var(--text-primary);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.25s;
    }

    .wp-search:focus {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 12px rgba(0, 240, 252, 0.1);
    }

    .wp-search::placeholder {
      color: var(--wp-text-muted);
    }

    .wp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1rem;
      flex: 1;
    }

    .wp-card {
      background: var(--wp-card-bg);
      border: 1px solid var(--wp-card-border);
      border-left: 3px solid var(--neon-purple);
      border-radius: 8px;
      padding: 1.25rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      animation: wp-card-in 0.4s ease-out both;
    }

    .wp-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(188, 19, 254, 0.03), transparent 60%);
      pointer-events: none;
    }

    @keyframes wp-card-in {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .wp-card:hover {
      border-color: var(--wp-card-hover-border);
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3), 0 0 20px rgba(188, 19, 254, 0.08);
    }

    .wp-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.5rem;
    }

    .wp-card-title {
      color: var(--neon-cyan);
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0.3px;
      flex: 1;
      margin-right: 0.75rem;
    }

    .wp-card-category {
      font-size: 0.65rem;
      padding: 0.2rem 0.5rem;
      border-radius: 10px;
      background: rgba(0, 240, 252, 0.1);
      color: var(--neon-cyan);
      border: 1px solid rgba(0, 240, 252, 0.2);
      white-space: nowrap;
    }

    .wp-card-excerpt {
      color: var(--text-secondary);
      font-size: 0.8rem;
      line-height: 1.6;
      margin-bottom: 0.75rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .wp-card-tags {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }

    .wp-card-tag {
      font-size: 0.6rem;
      padding: 0.15rem 0.5rem;
      border-radius: 8px;
      background: var(--wp-tag-bg);
      color: var(--neon-cyan);
      border: 1px solid var(--wp-tag-border);
    }

    .wp-card-meta {
      display: flex;
      gap: 1rem;
      font-size: 0.7rem;
      color: var(--wp-date-color);
      border-top: 1px solid rgba(188, 19, 254, 0.08);
      padding-top: 0.6rem;
    }

    .wp-card-meta-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .wp-card-meta-item.read-time {
      color: var(--wp-read-time-color);
    }

    .wp-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-secondary);
    }

    .wp-empty-icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      opacity: 0.5;
    }

    /* Detail Modal */
    .wp-modal-overlay {
      position: fixed;
      inset: 0;
      background: var(--wp-modal-overlay);
      backdrop-filter: blur(4px);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      animation: wp-modal-in 0.2s ease-out;
    }

    @keyframes wp-modal-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .wp-modal {
      background: var(--wp-card-bg);
      border: 1px solid rgba(188, 19, 254, 0.25);
      border-radius: 12px;
      max-width: 720px;
      width: 100%;
      max-height: 85vh;
      overflow: auto;
      padding: 2rem;
      position: relative;
      animation: wp-modal-content 0.25s ease-out;
      box-shadow: 0 0 60px rgba(0, 0, 0, 0.5);
    }

    @keyframes wp-modal-content {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .wp-modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: 1px solid rgba(188, 19, 254, 0.2);
      color: var(--text-secondary);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .wp-modal-close:hover {
      border-color: var(--neon-pink);
      color: var(--neon-pink);
      box-shadow: 0 0 10px rgba(255, 0, 255, 0.2);
    }

    .wp-modal-header {
      margin-bottom: 1rem;
      padding-right: 2rem;
    }

    .wp-modal-title {
      color: var(--neon-cyan);
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .wp-modal-meta {
      display: flex;
      gap: 1rem;
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .wp-modal-meta span.read-time {
      color: var(--neon-cyan);
    }

    .wp-modal-body {
      color: var(--text-primary);
      font-size: 0.85rem;
      line-height: 1.8;
      margin-top: 1rem;
    }

    .wp-modal-body p {
      margin-bottom: 1rem;
    }

    .wp-modal-body strong {
      color: var(--neon-cyan);
    }

    .wp-modal-body ul, .wp-modal-body ol {
      margin-bottom: 1rem;
      padding-left: 1.5rem;
    }

    .wp-modal-body li {
      margin-bottom: 0.3rem;
    }

    .wp-modal-body code {
      background: rgba(188, 19, 254, 0.1);
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      font-size: 0.8rem;
      color: var(--neon-purple);
    }

    .wp-modal-tags {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(188, 19, 254, 0.1);
    }

    .wp-modal-tag {
      font-size: 0.7rem;
      padding: 0.25rem 0.6rem;
      border-radius: 12px;
      background: var(--wp-tag-bg);
      color: var(--neon-cyan);
      border: 1px solid var(--wp-tag-border);
    }

    @media (max-width: 768px) {
      .wp-wrapper { padding: 0 0.75rem 1rem; }
      .wp-header { flex-direction: column; align-items: flex-start; }
      .wp-search { max-width: 100%; }
      .wp-grid { grid-template-columns: 1fr; }
      .wp-modal { padding: 1.25rem; margin: 0.5rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .wp-card { animation: none; }
      .wp-modal, .wp-modal-overlay { animation: none; }
    }
  </style>

    const WRITEUPS = [
      {
        title: 'Reducing Kubernetes Monitoring Costs by 60% with k3s and Istio',
        category: 'kubernetes',
        excerpt: 'How I built a cost-optimized observability stack on a $5/month k3s cluster, achieving full metrics, traces, and logs without the serverless price tag.',
        tags: ['kubernetes', 'istio', 'cost-optimization', 'prometheus'],
        date: '2026-05-15',
        readTime: '8 min read',
        content: `<p>Most Kubernetes monitoring guides recommend managed cloud solutions — and they work great until you see the bill. After deploying MeshWatch, I reduced monitoring costs by <strong>60% compared to serverless alternatives</strong>.</p>

<p>The key insight: <strong>you don't need a full EKS/AKS cluster for homelab-scale observability</strong>. A single k3s node (1 CPU, 2GB RAM) running Istio service mesh handles all my microservices with zero-downtime canary deployments.</p>

<p><strong>The stack:</strong></p>
<ul>
<li><strong>Istio</strong> — Service mesh with mTLS, traffic splitting, and circuit breaking</li>
<li><strong>Prometheus + Grafana</strong> — Metrics collection and 20-panel dashboards</li>
<li><strong>Loki</strong> — Log aggregation with 7-day retention</li>
<li><strong>Tempo</strong> — Distributed tracing for request lifecycle visibility</li>
<li><strong>Ollama Phi-3</strong> — AI-powered incident analysis via Tailscale tunnel</li>
</ul>

<p>Total monthly cost: <strong>$5.12</strong> vs $12.80 for a comparable serverless setup. That's $92.16 in annual savings from a homelab that fits on my HP laptop desk.</p>`
      },
      {
        title: 'Building a Discord Bot for Minecraft Server Management with Slash Commands',
        category: 'devops',
        excerpt: 'A full-stack Discord.py bot with 10 slash commands for real-time Minecraft server control, monitoring, and automated alerting via RCON protocol.',
        tags: ['discord', 'minecraft', 'automation', 'rcon'],
        date: '2026-04-22',
        readTime: '6 min read',
        content: `<p>Managing a Minecraft server from the terminal is fine. Managing it <strong>from Discord</strong> with slash commands and real-time metrics is better. Here's how I built a full-stack bot that bridges my Minecraft server with my monitoring pipeline.</p>

<p><strong>The architecture:</strong></p>
<ul>
<li><strong>Discord.py</strong> — Bot framework with 10 slash commands (/status, /players, /tps, /tps-graph, /restart, /whitelist, /ban, /tpo, /gamerules, /help)</li>
<li><strong>RCON Protocol</strong> — Direct server control for restarts, player management, and config changes</li>
<li><strong>JMX Exporter</strong> — Real-time Java metrics (TPS, heap usage, GC pauses) exposed to Prometheus</li>
<li><strong>Prometheus + Grafana</strong> — Dashboards that the bot queries for /status output</li>
</ul>

<p>The bot runs as a sidecar in the k3s cluster alongside the Minecraft server. When TPS drops below 18 or heap usage exceeds 400MB, it fires an alert to Discord via webhook — no Grafana dashboard needed.</p>`
      },
      {
        title: 'Integrating Ollama Phi-3 for Automated Incident Analysis in Kubernetes',
        category: 'ai',
        excerpt: 'Using local LLM inference via Tailscale to automatically analyze Prometheus alerts, suggest root causes, and generate remediation steps — all on a $5/month cluster.',
        tags: ['ollama', 'llm', 'incident-response', 'ai-ops'],
        date: '2026-06-01',
        readTime: '10 min read',
        content: `<p>When alerts fire at 3am, you don't want to wait for a human to debug. What if your monitoring stack could <strong>analyze the alert and suggest root causes</strong> before you even open Grafana?</p>

<p>I deployed <strong>Ollama Phi-3</strong> on my k3s cluster and connected it via Tailscale (outbound-only tunnel, no firewall holes). When Prometheus detects an anomaly, the incident pipeline:</p>

<ol>
<li>Captures relevant metrics from the last 5 minutes</li>
<li>Queries Grafana for the affected dashboard panels</li>
<li>Sends structured data to Ollama Phi-3 via a Tailscale tunnel (100.65.214.138:11434)</li>
<li>Returns a natural-language root cause analysis with remediation steps</li>
</ol>

<p><strong>Why local LLMs?</strong></p>
<ul>
<li><strong>Cost:</strong> $0 per query vs $0.002/query for cloud APIs (adds up fast with 50+ alerts/day)</li>
<li><strong>Privacy:</strong> No metrics data leaves your network — everything stays on the Tailscale mesh</li>
<li><strong>Latency:</strong> ~2s response time on a 1-thread Phi-3 model vs 5-10s for cloud APIs</li>
</ul>

<p>The system is still in beta, but it has already caught a memory leak in one of my Istio sidecars that Prometheus alone would have missed.</p>`
      },
      {
        title: 'Zero-Downtime Deployments with ArgoCD and Flagger on k3s',
        category: 'devops',
        excerpt: 'Implementing canary deployments with automated rollback using Flagger's traffic splitting, Prometheus-based SLO checks, and Istio gateways.',
        tags: ['argocd', 'flagger', 'canary', 'zero-downtime'],
        date: '2026-03-10',
        readTime: '7 min read',
        content: `<p>Deploying to production without downtime isn't about having the biggest cluster — it's about having the <strong>right deployment strategy</strong>. After months of trial and error on my k3s homelab, I've settled on a reliable canary deployment pipeline.</p>

<p><strong>The pipeline:</strong></p>
<ul>
<li><strong>ArgoCD</strong> — GitOps-driven deployments using the App of Apps pattern across multiple namespaces</li>
<li><strong>Flagger</strong> — Canary analysis with traffic splitting (10% → 25% → 50% → 100%)</li>
<li><strong>Prometheus SLO checks</strong> — Automatic rollback if error rate exceeds 0.5% during canary</li>
<li><strong>Istio gateways</strong> — Traffic splitting at the service mesh level</li>
</ul>

<p>The result: <strong>zero downtime deployments</strong> with automated rollback on failure. If a canary fails the SLO checks, Flagger automatically reverts traffic to the stable version within 30 seconds.</p>`
      },
      {
        title: 'Cloudflare Pages Deployment Pipeline for Static Portfolio Sites',
        category: 'cloud',
        excerpt: 'Setting up automated CI/CD with GitHub Actions, Cloudflare Pages, custom domain, SSL, and PWA support — all on a free tier.',
        tags: ['cloudflare', 'github-actions', 'pwa', 'ci-cd'],
        date: '2026-02-18',
        readTime: '5 min read',
        content: `<p>After evaluating Azure Blob Storage, Netlify, and Vercel for hosting this portfolio, I chose <strong>Cloudflare Pages</strong> for its free tier, automatic SSL, and built-in CDN.</p>

<p><strong>The deployment pipeline:</strong></p>
<ul>
<li><strong>GitHub Actions</strong> — <code>pages.yml</code> workflow triggers on push to master</li>
<li><strong>cloudflare/pages-action@v1</strong> — Builds and deploys the static site</li>
<li><strong>Cloudflare DNS</strong> — Custom domain (chai-homelab.com) with automatic SSL via Let's Encrypt</li>
<li><strong>PWA Service Worker</strong> — Offline caching with v6 cache strategy</li>
<li><strong>_headers</strong> — Cache-Control: 31536000s for static assets, 600s for config files</li>
</ul>

<p>Total cost: <strong>$0.50/month</strong> (Azure Blob for API gateway). The portfolio itself is completely free to host on Cloudflare Pages with unlimited bandwidth.</p>`
      },
      {
        title: 'Istio mTLS Service Mesh Security: A Practical Guide for Homelabs',
        category: 'kubernetes',
        excerpt: 'Implementing mutual TLS authentication between microservices using Istio's built-in certificate management, with practical lessons from a production-grade homelab.',
        tags: ['istio', 'mtls', 'security', 'service-mesh'],
        date: '2026-01-25',
        readTime: '9 min read',
        content: `<p>Plaintext HTTP between services in a Kubernetes cluster is the easiest attack vector you're not protecting against. <strong>mTLS (mutual TLS)</strong> solves this by requiring every service to present a valid certificate before accepting connections.</p>

<p>Istio makes mTLS straightforward with its built-in certificate management:</p>

<ol>
<li><strong>Trust domain</strong> — Define which CA certificates are trusted for incoming connections</li>
<li><strong>Secrets domain</strong> — Configure automatic certificate generation and rotation</li>
<li><strong>TLS policy</strong> — Set STRICT mode to enforce mTLS on all service-to-service communication</li>
</ol>

<p><strong>Key lessons from production:</strong></p>
<ul>
<li>Rotate certificates every 30 days (Istio handles this automatically)</li>
<li>Use separate trust domains for internal vs. external services</li>
<li>Monitor certificate expiry with Grafana alerts — expired certs cause cascade failures</li>
<li>Test mTLS enforcement by temporarily removing a service's certificate</li>
</ul>`
      }
    ];

    const grid = document.getElementById('wp-grid');
    const searchInput = document.getElementById('wp-search');
    const filterBtns = document.querySelectorAll('.wp-filter-btn');

    let activeFilter = '';
    let activeQuery = '';

    // Sanitize HTML for writeup content - only allows safe tags
    function sanitizeHtml(html) {
      if (!html) return '';
      const allowedTags = ['p','strong','em','ul','ol','li','code','br','h1','h2','h3','h4','blockquote'];
      const allowedAttr = ['class'];
      let result = html;
      // Strip all tags not in the allowed list
      result = result.replace(/<[^>]*>/g, (tag) => {
        const tagName = tag.match(/^<\s*([a-zA-Z]+)/)?.[1]?.toLowerCase();
        if (!tagName || !allowedTags.includes(tagName)) return '';
        return tag;
      });
      return result;
    }

    function renderWriteups() {
      const filtered = WRITEUPS.filter(w => {
        const matchFilter = !activeFilter || w.category === activeFilter || w.tags.includes(activeFilter);
        const matchQuery = !activeQuery ||
          w.title.toLowerCase().includes(activeQuery) ||
          w.excerpt.toLowerCase().includes(activeQuery) ||
          w.tags.some(t => t.includes(activeQuery));
        return matchFilter && matchQuery;
      });

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="wp-empty">
            <div class="wp-empty-icon">&#x1f50d;</div>
            <p>No articles match your search. Try a different filter or keyword.</p>
          </div>`;
        return;
      }

      grid.innerHTML = filtered.map((w, i) => `
        <div class="wp-card" data-index="${i}" tabindex="0" role="button" aria-label="Read article: ${escapeHtml(w.title)}">
          <div class="wp-card-top">
            <span class="wp-card-title">${escapeHtml(w.title)}</span>
            <span class="wp-card-category">${escapeHtml(w.category.toUpperCase())}</span>
          </div>
          <div class="wp-card-excerpt">${escapeHtml(w.excerpt)}</div>
          <div class="wp-card-tags">
            ${w.tags.map(t => `<span class="wp-card-tag">${escapeHtml(t)}</span>`).join('')}
          </div>
          <div class="wp-card-meta">
            <span class="wp-card-meta-item">&#x1f4c6; ${escapeHtml(w.date)}</span>
            <span class="wp-card-meta-item read-time">&#x1f56c; ${escapeHtml(w.readTime)}</span>
          </div>
        </div>
      `).join('');

      document.querySelectorAll('.wp-card').forEach(card => {
        card.addEventListener('click', () => {
          const idx = parseInt(card.dataset.index);
          openModal(WRITEUPS[idx]);
        });
        card.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            card.click();
          }
        });
      });
    }

    function openModal(article) {
      const overlay = document.createElement('div');
      overlay.className = 'wp-modal-overlay';

      overlay.innerHTML = `
        <div class="wp-modal" role="dialog" aria-label="${escapeHtml(article.title)}">
          <button class="wp-modal-close" aria-label="Close article">&times;</button>
          <div class="wp-modal-header">
            <div class="wp-modal-title">${escapeHtml(article.title)}</div>
            <div class="wp-modal-meta">
              <span>&#x1f4c6; ${escapeHtml(article.date)}</span>
              <span class="read-time">&#x1f56c; ${escapeHtml(article.readTime)}</span>
            </div>
          </div>
          <div class="wp-modal-body">${sanitizeHtml(article.content)}</div>
          <div class="wp-modal-tags">
            ${article.tags.map(t => `<span class="wp-modal-tag">${escapeHtml(t)}</span>`).join('')}
          </div>
        </div>
      `;

      document.body.appendChild(overlay);

      overlay.querySelector('.wp-modal-close').addEventListener('click', () => overlay.remove());
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) overlay.remove();
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && document.body.contains(overlay)) {
          overlay.remove();
        }
      }, { once: true });
    }

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        renderWriteups();
      });
    });

    searchInput.addEventListener('input', () => {
      activeQuery = searchInput.value.toLowerCase().trim();
      renderWriteups();
    });

    // Online status handled by pwa.js globally

    // Theme persistence
    if (localStorage.getItem('portfolio-theme') === 'retro') {
      document.body.classList.add('theme-retro');
    }

    renderWriteups();
  </script>
</body>
</html>
