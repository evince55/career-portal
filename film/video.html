<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chai-homelab.com — animated ident (exportable)</title>
<style>
  @font-face { font-family: 'Space Grotesk'; src: url('fonts/space-grotesk.woff2') format('woff2'); font-weight: 300 700; }
  @font-face { font-family: 'JetBrains Mono'; src: url('fonts/jetbrains-mono.woff2') format('woff2'); font-weight: 100 800; }
  html, body { margin: 0; background: #07070b; height: 100%; }
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<script type="text/babel" src="animations.stage.js"></script>
<script type="text/babel">
const { Stage, Sprite, TextSprite, useTime, useSprite, Easing, interpolate, animate, clamp } = window;

// palette — mirrors css/tokens.css (hardcoded: the export serializes the SVG standalone)
const C = { bg:'#07070b', card:'#16161f', line:'rgba(255,255,255,0.10)', t1:'#f2f0f7', t2:'#bdbace', t3:'#8a889f',
  cyan:'#2bd7d6', indigo:'#8099ff', emerald:'#44e4a4', magenta:'#f577c8', ok:'#4ade80' };
const MONO = "'JetBrains Mono', monospace";
const SANS = "'Space Grotesk', sans-serif";
const W = 1920, H = 1080, DUR = 20;

/* ---------- helpers ---------- */
function Cam({ from = 1.05, to = 1, panY = 0, children }) {
  const { progress } = useSprite();
  const s = from + (to - from) * Easing.easeOutCubic(progress);
  return <div style={{ position:'absolute', inset:0, transform:`scale(${s}) translateY(${panY * (1-progress)}px)`, transformOrigin:'50% 45%' }}>{children}</div>;
}
function TypeOn({ text, begin = 0, cps = 16, color = C.t1, size = 44, caret = C.cyan, style }) {
  const { localTime } = useSprite();
  const n = Math.max(0, Math.floor((localTime - begin) * cps));
  const blink = Math.floor(localTime * 2.4) % 2 === 0;
  return <div style={{ fontFamily: MONO, fontSize: size, color, whiteSpace:'pre', ...style }}>
    {text.slice(0, n)}<span style={{ color: caret, opacity: (n >= text.length && !blink) ? 0 : 1 }}>▌</span>
  </div>;
}
function Count({ to, decimals = 0, suffix = '', begin = 0.3, dur = 1.8, size = 130, color = C.t1 }) {
  const { localTime } = useSprite();
  const p = clamp((localTime - begin) / dur, 0, 1);
  const v = to * Easing.easeOutQuart(p);
  return <span style={{ fontFamily: MONO, fontWeight: 600, fontSize: size, color, fontVariantNumeric:'tabular-nums' }}>{v.toFixed(decimals)}{suffix}</span>;
}
// the cluster-mesh motif, simplified: hand-placed nodes + edges that draw in
const NODES = [[300,260],[520,180],[760,300],[1050,200],[1320,320],[1560,220],[1680,420],[1430,560],[1150,480],[860,600],[560,520],[340,660],[980,760],[1350,780],[620,820]];
const EDGES = [[0,1],[1,2],[2,3],[3,4],[4,5],[4,6],[6,7],[7,8],[8,9],[9,10],[10,11],[8,12],[12,13],[10,14],[2,8],[3,8]];
function Mesh({ color = C.cyan, buildDur = 2.2 }) {
  const { localTime } = useSprite();
  return <svg width={W} height={H} style={{ position:'absolute', inset:0 }} viewBox={`0 0 ${W} ${H}`}>
    {EDGES.map(([a,b], i) => {
      const p = clamp((localTime - 0.5 - i * 0.07) / 0.5, 0, 1);
      const [x1,y1] = NODES[a], [x2,y2] = NODES[b];
      return <line key={i} x1={x1} y1={y1} x2={x1+(x2-x1)*p} y2={y1+(y2-y1)*p} stroke={color} strokeOpacity="0.28" strokeWidth="2"/>;
    })}
    {NODES.map(([x,y], i) => {
      const p = clamp((localTime - i * 0.06) / 0.4, 0, 1);
      const hub = i % 5 === 0;
      return <g key={i} opacity={p}>
        {hub && <circle cx={x} cy={y} r={16} fill="none" stroke={color} strokeOpacity="0.5" strokeWidth="2"/>}
        <circle cx={x} cy={y} r={hub ? 6 : 4} fill={color} fillOpacity={hub ? 0.95 : 0.55}/>
      </g>;
    })}
  </svg>;
}
function Glow({ color, x = '72%', y = '40%', o = 0.22 }) {
  return <div style={{ position:'absolute', inset:0, background:`radial-gradient(52% 46% at ${x} ${y}, ${color}, transparent 70%)`, opacity:o }}/>;
}
const hex2rgba = (h, a) => `rgba(${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)},${a})`;

/* ---------- scenes ---------- */
function S1() { // 0–4.5 · the mesh forms, the name types on
  return <Cam from={1.06}>
    <Glow color={hex2rgba(C.cyan, 0.5)} o={0.16}/>
    <Mesh/>
    <div style={{ position:'absolute', left:150, top:400 }}>
      <TypeOn text="eugene vincent" begin={0.8} cps={14} size={110} style={{ fontFamily:SANS, fontWeight:600, letterSpacing:'-0.03em' }}/>
      <Sprite start={2.4} end={99} keepMounted={false}>
        <TextSprite text="production infrastructure · cost-aware AI · run from a homelab" x={6} y={160} size={34} color={C.t3} font={MONO} entryDur={0.5}/>
      </Sprite>
    </div>
  </Cam>;
}
const ROOMS = [
  { n:'01', name:'Home',      d:'the living cluster', c:C.cyan },
  { n:'02', name:'Projects',  d:'system explorer',    c:C.indigo },
  { n:'03', name:'Dashboard', d:'live ops',           c:C.emerald },
  { n:'04', name:'Contact',   d:'the terminal',       c:C.magenta },
];
function Room({ r, i }) {
  const { localTime } = useSprite();
  const p = clamp((localTime - 0.5 - i * 0.35) / 0.6, 0, 1);
  const e = Easing.easeOutCubic(p);
  return <div style={{ position:'absolute', left:140 + i * 430, top:430, width:380, height:330, opacity:e,
    transform:`translateY(${(1-e)*60}px)`, background:C.card, border:`1px solid ${C.line}`, borderTop:`3px solid ${r.c}`, borderRadius:20, padding:'36px 40px', boxSizing:'border-box' }}>
    <div style={{ fontFamily:MONO, fontSize:26, color:r.c, letterSpacing:'0.14em' }}>{r.n}</div>
    <div style={{ fontFamily:SANS, fontWeight:600, fontSize:56, color:C.t1, marginTop:70 }}>{r.name}</div>
    <div style={{ fontFamily:MONO, fontSize:26, color:C.t3, marginTop:14 }}>{r.d}</div>
    <div style={{ position:'absolute', right:34, top:30, width:14, height:14, borderRadius:'50%', background:r.c, boxShadow:`0 0 24px ${r.c}` }}/>
  </div>;
}
function S2() { // 4.5–9.5 · four rooms, one house
  return <Cam from={1} to={1.04}>
    <TextSprite text="Four rooms. One house." x={140} y={220} size={92} color={C.t1} font={SANS} weight={600} entryDur={0.5}/>
    <TextSprite text="one type scale · one motion curve · four accents" x={144} y={330} size={30} color={C.t3} font={MONO} entryDur={0.7}/>
    {ROOMS.map((r, i) => <Room key={r.n} r={r} i={i}/>)}
  </Cam>;
}
function S3() { // 9.5–14.5 · live from the rack
  const { localTime } = useSprite();
  const blink = Math.floor(localTime * 1.6) % 2 === 0;
  const grid = `linear-gradient(${hex2rgba(C.emerald,0.06)} 1px, transparent 1px), linear-gradient(90deg, ${hex2rgba(C.emerald,0.06)} 1px, transparent 1px)`;
  const stat = (label) => ({ fontFamily:MONO, fontSize:28, color:C.t3, letterSpacing:'0.1em', textTransform:'uppercase', marginTop:10 });
  return <Cam from={1.05}>
    <div style={{ position:'absolute', inset:0, backgroundImage:grid, backgroundSize:'64px 64px' }}/>
    <Glow color={hex2rgba(C.emerald,0.5)} x="50%" y="110%" o={0.15}/>
    <div style={{ position:'absolute', left:150, top:220, display:'flex', alignItems:'center', gap:22 }}>
      <span style={{ width:18, height:18, borderRadius:'50%', background:C.ok, boxShadow:blink?`0 0 0 10px ${hex2rgba(C.ok,0.15)}`:'none' }}/>
      <span style={{ fontFamily:MONO, fontSize:34, color:C.t3, letterSpacing:'0.16em' }}>LIVE FROM THE RACK — <b style={{color:C.emerald}}>K3S HOMELAB</b></span>
    </div>
    <div style={{ position:'absolute', left:150, top:400, display:'flex', gap:150 }}>
      <div><Count to={99.8} decimals={1} suffix="%" begin={0.4}/><div style={stat()}>server uptime</div></div>
      <div><Count to={20} begin={0.7}/><div style={stat()}>tick rate · max 20</div></div>
      <div><Count to={861} begin={1.0}/><div style={stat()}>JVM heap · MB</div></div>
    </div>
    <TextSprite text="updated just now · cron publishes every ~10 min" x={154} y={760} size={28} color={C.t3} font={MONO} entryDur={1.2}/>
  </Cam>;
}
function S4() { // 14.5–20 · the ask + the address
  return <Cam from={1} to={1.05}>
    <Glow color={hex2rgba(C.magenta,0.5)} x="20%" y="85%" o={0.14}/>
    <Glow color={hex2rgba(C.cyan,0.5)} x="85%" y="15%" o={0.14}/>
    <TextSprite text="Open to DevOps + AI internships." x={150} y={330} size={72} color={C.t1} font={SANS} weight={600} entryDur={0.5}/>
    <TextSprite text="And fast, modern sites for local businesses." x={150} y={430} size={72} color={C.t1} font={SANS} weight={600} entryDur={0.9}/>
    <Sprite start={1.8} end={99}>
      <div style={{ position:'absolute', left:150, top:600 }}>
        <TypeOn text="$ sudo hire-me" begin={0} cps={14} size={40} color={C.t2} caret={C.magenta}/>
        <Sprite start={1.4} end={99}>
          <div style={{ fontFamily:MONO, fontSize:40, color:C.magenta, marginTop:16 }}>access granted → <span style={{color:C.cyan}}>chai-homelab.com</span></div>
        </Sprite>
      </div>
    </Sprite>
  </Cam>;
}

function TimeLabel({ children }) {
  const t = useTime();
  return <div data-screen-label={`t=${Math.floor(t)}s`} style={{ position:'absolute', inset:0 }}>{children}</div>;
}

function Ident() {
  return <Stage width={W} height={H} duration={DUR} background={C.bg}>
    <TimeLabel>
      <Sprite start={0} end={4.5}><S1/></Sprite>
      <Sprite start={4.5} end={9.5}><S2/></Sprite>
      <Sprite start={9.5} end={14.5}><S3/></Sprite>
      <Sprite start={14.5} end={20}><S4/></Sprite>
    </TimeLabel>
  </Stage>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Ident/>);
</script>
</body>
</html>
