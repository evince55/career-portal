<body>

    <button id="audio-toggle" class="hidden-btn" aria-label="Toggle keystroke sounds" role="switch" aria-checked="false">

    <button id="theme-toggle-btn" class="theme-toggle-btn" aria-label="Toggle theme" title="Toggle theme">

        <div class="command-line">

          <input type="text" id="command-input" class="terminal-input" autocomplete="off" autofocus aria-label="Command input" placeholder="Type a command...">

      </div>
    </div>
  </main>

  <script src="js/pwa.js?v=2"></script>
  <script type="module">
    import { initMobileNav } from '/js/mobile-nav.js?v=2';
    initMobileNav();

    // Skip link focus management — move focus to target on click
    document.querySelectorAll('.skip-link').forEach(link => {
      link.addEventListener('click', (e) => {
        const target = document.querySelector(link.getAttribute('href'));
        if (target) {
          e.preventDefault();
          target.setAttribute('tabindex', '-1');
          target.focus();
          target.addEventListener('blur', () => target.removeAttribute('tabindex'), { once: true });
        }
      });
    });

    // Focus handler on command input — only activates when tapping the command line area
    const cmdInput = document.getElementById('command-input');
    const cmdLine = document.querySelector('.command-line');
    if (cmdInput) {
      cmdInput.addEventListener('click', () => cmdInput.focus());
      cmdInput.addEventListener('touchstart', () => cmdInput.focus(), { passive: true });
    }

    // Only focus on tapping the command-line area, not the whole terminal body
    if (cmdLine && cmdInput) {
      cmdLine.addEventListener('click', () => cmdInput.focus());
      cmdLine.addEventListener('touchstart', () => cmdInput.focus(), { passive: true });
    }

    // Theme toggle button
    const themeBtn = document.getElementById('theme-toggle-btn');
    if (themeBtn) {
      themeBtn.addEventListener('click', () => {
        document.body.classList.toggle('theme-retro');
        const isRetro = document.body.classList.contains('theme-retro');
        localStorage.setItem('portfolio-theme', isRetro ? 'retro' : 'synthwave');
        updateThemeIcon(isRetro);
      });

      // Initialize icon visibility based on current theme
      const currentTheme = localStorage.getItem('portfolio-theme');
      updateThemeIcon(currentTheme === 'retro');
    }

    function updateThemeIcon(isRetro) {
      const synthwaveIcon = themeBtn.querySelector('.theme-icon-synthwave');
      const retroIcon = themeBtn.querySelector('.theme-icon-retro');
      if (synthwaveIcon && retroIcon) {
        synthwaveIcon.style.display = isRetro ? 'none' : 'inline';
        retroIcon.style.display = isRetro ? 'inline' : 'none';
      }
    }
  </script>
  <script type="module">
    import ThreeManager from '/js/three-manager.js?v=2';
    import { buildTerminalScene } from '/js/three-geometries.js?v=2';

    try {
      const three = new ThreeManager({ width: window.innerWidth, height: window.innerHeight });
      if (!three.disabled) {
        three.init();

        const terminalScene = buildTerminalScene(three);
        for (const comp of terminalScene.components) {
          three.addComponent(comp);
        }

        window.addEventListener('beforeunload', () => three.dispose());
      }
    } catch (e) {
      console.warn('[Three.js] Initialization failed:', e.message);
    }
  </script>
</body>
