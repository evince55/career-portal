<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eugene Vincent | Terminal Portfolio</title>
  <meta name="description" content="FAANG-quality terminal-themed portfolio showcasing MeshWatch, Minecraft monitoring, and cloud-native architectures.">
  <meta name="keywords" content="portfolio, devops, azure, kubernetes, meshwatch, minecraft, sre, fullstack">
  <meta property="og:title" content="Eugene Vincent | Terminal Portfolio">
  <meta property="og:description" content="FAANG-quality terminal-themed portfolio showcasing MeshWatch, Minecraft monitoring, and cloud-native architectures.">
  <meta property="og:image" content="/icons/icon-96.png">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <a href="#terminal-output" class="skip-link">Skip to terminal</a>
  <div id="crt-overlay"></div>
  <header class="terminal-header" role="banner">
    <h1 class="glitch" data-text="Eugene Vincent" aria-label="Eugene Vincent - Terminal Portfolio">Eugene Vincent</h1>
    <p class="subtitle">Full Stack Engineer | Azure DevOps | SRE</p>
    <button id="audio-toggle" class="hidden-btn" aria-label="Toggle keystroke sounds" role="switch" aria-checked="false">
      <span class="audio-icon" aria-hidden="true">🔇</span>
      <span class="sr-only">Sound effects</span>
    </button>
  </header>
  <main class="terminal-container">
    <div class="terminal-window">
      <div class="terminal-titlebar">
        <span class="traffic-light red" aria-hidden="true"></span>
        <span class="traffic-light yellow" aria-hidden="true"></span>
        <span class="traffic-light green" aria-hidden="true"></span>
        <span class="title-text">eugene@homelab:~ — chai-homelab.com</span>
      </div>
      <div class="terminal-body">
        <div id="terminal-output" class="terminal-output" role="log" aria-live="polite" aria-label="Terminal output" tabindex="0"></div>
        <div class="command-line">
          <span class="prompt" aria-hidden="true">$</span>
          <input type="text" id="command-input" class="terminal-input" autocomplete="off" autofocus aria-label="Command input" placeholder="Type a command...">
        </div>
      </div>
    </div>
  </main>
  <footer class="terminal-footer" role="contentinfo">
    <div class="footer-left">
      <p>Type <span class="command">help</span> to see available commands</p>
    </div>
    <div class="footer-right">
      <button id="demo-start-btn" class="demo-btn" aria-label="Start career fair demo mode">🎯 Start Demo Mode</button>
      <span id="online-status" class="status-indicator" aria-live="polite" aria-label="Network status"></span>
    </div>
  </footer>
  <nav class="mobile-nav" id="mobile-nav">
    <a href="/project-explorer" class="demo-btn" style="text-decoration:none;" aria-label="Project Explorer">📂 Projects</a>
    <a href="/dashboard" class="demo-btn" style="text-decoration:none;" aria-label="Live Dashboard">📊 Dashboard</a>
    <a href="/writeups" class="demo-btn" style="text-decoration:none;" aria-label="Writeups">✎ Writeups</a>
    <a href="/contact" class="demo-btn" style="text-decoration:none;" aria-label="Contact">✉ Contact</a>
  </nav>
  <button class="ct-hamburger" id="mobile-menu-btn" aria-label="Toggle navigation menu" aria-expanded="false"></button>
  <script type="module" src="js/terminal.js"></script>
  <script type="module" src="js/audio.js"></script>
  <script type="module" src="js/performance.js"></script>
  <script src="js/pwa.js"></script>
  <script type="module" src="js/visual-effects.js"></script>
  <script type="module">
    import { initMobileNav } from '/js/mobile-nav.js';
    initMobileNav();

    // Mobile tap-to-focus: tap anywhere in terminal area to focus input
    const terminalOutput = document.getElementById('terminal-output');
    const commandInput = document.getElementById('command-input');
    if (terminalOutput && commandInput) {
      terminalOutput.addEventListener('click', () => {
        commandInput.focus();
      });
      terminalOutput.addEventListener('touchstart', () => {
        commandInput.focus();
      }, { passive: true });
    }
  </script>
</body>
</html>
