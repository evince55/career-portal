    <line x1="600" y1="450" x2="160" y2="630"/>
    <line x1="600" y1="450" x2="-60" y2="630"/>
    <line x1="600" y1="450" x2="820" y2="630"/>
    <line x1="600" y1="450" x2="1040" y2="630"/>
    <line x1="600" y1="450" x2="1260" y2="630"/>
