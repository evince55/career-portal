<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b14"/>
      <stop offset="0.6" stop-color="#08080d"/>
      <stop offset="1" stop-color="#0e0a16"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#3fd8e8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#3fd8e8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- synthwave grid horizon -->
  <g stroke="url(#fade)" stroke-width="1.5">
    <line x1="0" y1="470" x2="1200" y2="470"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="590" x2="1200" y2="590"/>
