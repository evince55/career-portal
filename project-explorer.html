<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eugene Vincent | Project Explorer</title>
  <meta name="description" content="Interactive project explorer for MeshWatch, Minecraft monitoring, and cloud-native architectures.">
  <meta name="keywords" content="projects, meshwatch, minecraft, devops, kubernetes, portfolio">
  <meta property="og:title" content="Eugene Vincent | Project Explorer">
  <meta property="og:description" content="Interactive project explorer for MeshWatch, Minecraft monitoring, and cloud-native architectures.">
  <meta property="og:image" content="/icons/icon-96.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96.png">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --pe-bg: #0c0c14;
      --pe-card-bg: #12121e;
      --pe-card-border: rgba(188, 19, 254, 0.15);
      --pe-card-hover-border: rgba(0, 240, 252, 0.4);
      --pe-filter-bg: rgba(188, 19, 254, 0.08);
      --pe-filter-active: linear-gradient(135deg, rgba(188, 19, 254, 0.3), rgba(0, 240, 252, 0.15));
      --pe-modal-overlay: rgba(0, 0, 0, 0.7);
      --pe-text-muted: rgba(255, 255, 255, 0.4);
    }

    body.theme-retro {
      --pe-bg: #0f0d0a;
      --pe-card-bg: #1a1610;
      --pe-card-border: rgba(255, 140, 0, 0.15);
      --pe-card-hover-border: rgba(255, 170, 0, 0.4);
      --pe-filter-bg: rgba(255, 140, 0, 0.08);
      --pe-filter-active: linear-gradient(135deg, rgba(255, 140, 0, 0.3), rgba(255, 200, 0, 0.15));
      --pe-text-muted: rgba(232, 198, 122, 0.4);
    }

    .pe-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem 2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .pe-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1.5rem 0 1rem;
      border-bottom: 1px solid rgba(188, 19, 254, 0.12);
      margin-bottom: 1.5rem;
    }

    .pe-header h2 {
      color: var(--neon-cyan);
      font-size: 1.1rem;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .pe-header h2 span {
      color: var(--text-secondary);
      font-weight: 400;
    }

    .pe-nav {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .pe-nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.8rem;
      padding: 0.35rem 0.75rem;
      border: 1px solid rgba(188, 19, 254, 0.2);
      border-radius: 4px;
      transition: all 0.2s;
    }

    .pe-nav a:hover {
      color: var(--neon-cyan);
      border-color: var(--neon-cyan);
      box-shadow: 0 0 10px rgba(0, 240, 252, 0.15);
    }

    .pe-controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
      align-items: center;
    }

    .pe-filters {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .pe-filter-btn {
      background: var(--pe-filter-bg);
      border: 1px solid rgba(188, 19, 254, 0.2);
      color: var(--text-secondary);
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.25s;
    }

    .pe-filter-btn:hover {
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
    }

    .pe-filter-btn.active {
      background: var(--pe-filter-active);
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
      box-shadow: 0 0 12px rgba(0, 240, 252, 0.15);
    }

    .pe-search {
      flex: 1;
      min-width: 200px;
      max-width: 340px;
      background: var(--pe-card-bg);
      border: 1px solid rgba(188, 19, 254, 0.15);
      color: var(--text-primary);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.25s;
    }

    .pe-search:focus {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 12px rgba(0, 240, 252, 0.1);
    }

    .pe-search::placeholder {
      color: var(--pe-text-muted);
    }

    .pe-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1rem;
      flex: 1;
    }

    .pe-card {
      background: var(--pe-card-bg);
      border: 1px solid var(--pe-card-border);
      border-left: 3px solid var(--neon-purple);
      border-radius: 8px;
      padding: 1.25rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      animation: pe-card-in 0.4s ease-out both;
    }

    @keyframes pe-card-in {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .pe-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(188, 19, 254, 0.03), transparent 60%);
      pointer-events: none;
    }

    .pe-card:hover {
      border-color: var(--pe-card-hover-border);
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3), 0 0 20px rgba(188, 19, 254, 0.08);
    }

    .pe-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.5rem;
    }

    .pe-card-name {
      color: var(--neon-cyan);
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.3px;
    }

    .pe-card-category {
      font-size: 0.65rem;
      padding: 0.2rem 0.5rem;
      border-radius: 10px;
      background: rgba(0, 240, 252, 0.1);
      color: var(--neon-cyan);
      border: 1px solid rgba(0, 240, 252, 0.2);
      white-space: nowrap;
    }

    .pe-card-desc {
      color: var(--text-secondary);
      font-size: 0.8rem;
      line-height: 1.6;
      margin-bottom: 0.75rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .pe-card-badges {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }

    .pe-card-tag {
      font-size: 0.6rem;
      padding: 0.15rem 0.5rem;
      border-radius: 8px;
      background: rgba(188, 19, 254, 0.1);
      color: var(--neon-purple);
      border: 1px solid rgba(188, 19, 254, 0.15);
    }

    .pe-card-stats {
      display: flex;
      gap: 1rem;
      font-size: 0.7rem;
      color: var(--pe-text-muted);
      border-top: 1px solid rgba(188, 19, 254, 0.08);
      padding-top: 0.6rem;
    }

    .pe-card-stat {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .pe-card-stat-icon {
      opacity: 0.6;
    }

    .pe-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-secondary);
    }

    .pe-empty-icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      opacity: 0.5;
    }

    /* Detail Modal */
    .pe-modal-overlay {
      position: fixed;
      inset: 0;
      background: var(--pe-modal-overlay);
      backdrop-filter: blur(4px);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      animation: pe-modal-in 0.2s ease-out;
    }

    @keyframes pe-modal-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .pe-modal {
      background: var(--pe-card-bg);
      border: 1px solid rgba(188, 19, 254, 0.25);
      border-radius: 12px;
      max-width: 640px;
      width: 100%;
      max-height: 85vh;
      overflow: auto;
      padding: 2rem;
      position: relative;
      animation: pe-modal-content 0.25s ease-out;
      box-shadow: 0 0 60px rgba(0, 0, 0, 0.5);
    }

    @keyframes pe-modal-content {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .pe-modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: 1px solid rgba(188, 19, 254, 0.2);
      color: var(--text-secondary);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .pe-modal-close:hover {
      border-color: var(--neon-pink);
      color: var(--neon-pink);
      box-shadow: 0 0 10px rgba(255, 0, 255, 0.2);
    }

    .pe-modal-header {
      margin-bottom: 1rem;
      padding-right: 2rem;
    }

    .pe-modal-name {
      color: var(--neon-cyan);
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .pe-modal-desc {
      color: var(--text-secondary);
      font-size: 0.85rem;
      line-height: 1.7;
      margin: 0.75rem 0;
    }

    .pe-modal-section {
      margin: 1.25rem 0;
    }

    .pe-modal-section-title {
      color: var(--neon-pink);
      font-size: 0.75rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      opacity: 0.8;
    }

    .pe-modal-tech {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .pe-modal-tech-item {
      background: rgba(188, 19, 254, 0.08);
      border: 1px solid rgba(188, 19, 254, 0.15);
      border-radius: 6px;
      padding: 0.35rem 0.75rem;
      font-size: 0.75rem;
      color: var(--text-primary);
      display: flex;
      gap: 0.4rem;
    }

    .pe-modal-tech-item .level {
      color: var(--neon-cyan);
      opacity: 0.7;
      font-size: 0.65rem;
    }

    .pe-modal-achievements {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .pe-modal-achievements li {
      padding: 0.3rem 0;
      font-size: 0.8rem;
      color: var(--success);
    }

    .pe-modal-achievements li::before {
      content: '▸ ';
      color: var(--neon-purple);
    }

    .pe-modal-links {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(188, 19, 254, 0.1);
    }

    .pe-modal-link {
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.8rem;
      text-decoration: none;
      font-family: var(--font-mono);
      border: 1px solid var(--neon-cyan);
      color: var(--neon-cyan);
      transition: all 0.25s;
    }

    .pe-modal-link:hover {
      background: var(--neon-cyan);
      color: var(--bg-darker);
      box-shadow: 0 0 20px rgba(0, 240, 252, 0.3);
    }

    .pe-modal-link.github {
      border-color: var(--neon-purple);
      color: var(--neon-purple);
    }

    .pe-modal-link.github:hover {
      background: var(--neon-purple);
      color: #fff;
      box-shadow: 0 0 20px rgba(188, 19, 254, 0.3);
    }

    .pe-modal-metrics {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.5rem;
    }

    .pe-modal-metric {
      background: rgba(0, 240, 252, 0.04);
      border: 1px solid rgba(0, 240, 252, 0.1);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
    }

    .pe-modal-metric-label {
      font-size: 0.6rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .pe-modal-metric-value {
      font-size: 0.9rem;
      color: var(--neon-cyan);
      margin-top: 0.15rem;
    }

    .pe-modal-note {
      font-size: 0.75rem;
      color: var(--warning);
      font-style: italic;
      margin-top: 0.75rem;
    }

    @media (max-width: 768px) {
      .pe-wrapper { padding: 0 0.75rem 1rem; }
      .pe-header { flex-direction: column; align-items: flex-start; }
      .pe-search { max-width: 100%; }
      .pe-grid { grid-template-columns: 1fr; }
      .pe-modal { padding: 1.25rem; margin: 0.5rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .pe-card { animation: none; }
      .pe-modal, .pe-modal-overlay { animation: none; }
    }
  </style>
</head>
<body>
  <a href="#pe-grid" class="skip-link">Skip to project explorer</a>
  <div id="crt-overlay"></div>
  <header class="terminal-header" role="banner">
    <h1 class="glitch" data-text="Eugene Vincent">Eugene Vincent</h1>
    <p class="subtitle">Full Stack Engineer | Azure DevOps | SRE</p>
  </header>
  <main class="terminal-container" style="flex:1;display:flex;flex-direction:column;">
    <div class="terminal-window" style="display:flex;flex-direction:column;flex:1;">
      <div class="terminal-titlebar">
        <span class="traffic-light red" aria-hidden="true"></span>
        <span class="traffic-light yellow" aria-hidden="true"></span>
        <span class="traffic-light green" aria-hidden="true"></span>
        <span class="title-text">eugene@homelab:~/projects — Project Explorer</span>
      </div>
      <div class="terminal-body" style="flex:1;display:flex;flex-direction:column;">
        <div class="pe-wrapper">
          <div class="pe-header">
            <h2>📂 <span>Project Explorer</span></h2>
            <nav class="pe-nav">
              <a href="/">⌂ Terminal</a>
              <a href="/dashboard">📊 Dashboard</a>
              <a href="/writeups">✎ Writeups</a>
              <a href="/contact">✉ Contact</a>
            </nav>
          </div>

          <div class="pe-controls">
            <div class="pe-filters" id="pe-filters">
              <button class="pe-filter-btn active" data-filter="">All</button>
              <button class="pe-filter-btn" data-filter="cloud">☁️ Cloud</button>
              <button class="pe-filter-btn" data-filter="devops">⚙️ DevOps</button>
              <button class="pe-filter-btn" data-filter="iot">📡 IoT</button>
              <button class="pe-filter-btn" data-filter="web">🌐 Web</button>
            </div>
            <input type="text" class="pe-search" id="pe-search" placeholder="Search projects..." autocomplete="off">
          </div>

          <div class="pe-grid" id="pe-grid" role="list" aria-label="Project cards"></div>
        </div>
      </div>
    </div>
  </main>
  <footer class="terminal-footer" role="contentinfo">
    <div class="footer-left">
      <p>← Back to <a href="/" style="color:var(--neon-cyan);">Terminal</a></p>
    </div>
    <div class="footer-right">
      <button class="ct-hamburger" id="mobile-menu-btn" aria-label="Toggle navigation menu" aria-expanded="false">&#x2630;</button>
      <nav class="mobile-nav" id="mobile-nav">
        <a href="/project-explorer" class="demo-btn" style="text-decoration:none;" aria-label="Project Explorer">📂 Projects</a>
        <a href="/dashboard" class="demo-btn" style="text-decoration:none;" aria-label="Live Dashboard">📊 Dashboard</a>
        <a href="/writeups" class="demo-btn" style="text-decoration:none;" aria-label="Writeups">✎ Writeups</a>
        <a href="/contact" class="demo-btn" style="text-decoration:none;" aria-label="Contact">✉ Contact</a>
      </nav>
      <span id="online-status" class="status-indicator" aria-live="polite" aria-label="Network status"></span>
    </div>
  </footer>

  <script type="module">
    import { initMobileNav } from '/js/mobile-nav.js';
    import PROJECT_CATALOG from '/js/project-catalog.js';
    import { escapeHtml } from '/js/utils/helpers.js';

    initMobileNav();

    // Online status handled by pwa.js globally

    // Transform catalog data into explorer format
    function transformProject(slug, cat) {
      const metrics = {};
      for (const [key, val] of Object.entries(cat.metrics || {})) {
        metrics[key.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase())] = String(val);
      }

      return {
        name: cat.name,
        slug: cat.slug,
        category: cat.category,
        description: cat.description,
        tags: cat.tags || [],
        badges: cat.badges || [],
        techStack: cat.techStack || [],
        metrics,
        achievements: cat.keyAchievements || [],
        githubUrl: cat.githubUrl,
        liveUrl: cat.liveUrl,
        demoNote: cat.demoNote
      };
    }

    const PROJECTS = Object.values(PROJECT_CATALOG).map(p => transformProject(p.slug, p));

    const grid = document.getElementById('pe-grid');
    const search = document.getElementById('pe-search');
    const filterBtns = document.querySelectorAll('.pe-filter-btn');

    let activeFilter = '';
    let activeQuery = '';

    function renderProjects() {
      const filtered = PROJECTS.filter(p => {
        const matchFilter = !activeFilter || p.category === activeFilter || p.tags.includes(activeFilter);
        const matchQuery = !activeQuery ||
          p.name.toLowerCase().includes(activeQuery) ||
          p.description.toLowerCase().includes(activeQuery) ||
          p.tags.some(t => t.includes(activeQuery));
        return matchFilter && matchQuery;
      });

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="pe-empty">
            <div class="pe-empty-icon">🔍</div>
            <p>No projects match your search. Try a different filter or keyword.</p>
          </div>`;
        return;
      }

      grid.innerHTML = filtered.map(p => `
        <div class="pe-card" data-slug="${escapeHtml(p.slug)}" tabindex="0" role="button" aria-label="View details for ${escapeHtml(p.name)}">
          <div class="pe-card-top">
            <span class="pe-card-name">${escapeHtml(p.name)}</span>
            <span class="pe-card-category">${escapeHtml(p.category.toUpperCase())}</span>
          </div>
          <div class="pe-card-desc">${escapeHtml(p.description)}</div>
          <div class="pe-card-badges">
            ${p.tags.map(t => `<span class="pe-card-tag">${escapeHtml(t)}</span>`).join('')}
          </div>
          <div class="pe-card-stats">
            <span class="pe-card-stat">
              <span class="pe-card-stat-icon">📦</span>
              ${p.techStack.length} technologies
            </span>
            <span class="pe-card-stat">
              <span class="pe-card-stat-icon">🏆</span>
              ${p.achievements.length} achievements
            </span>
          </div>
        </div>
      `).join('');

      document.querySelectorAll('.pe-card').forEach(card => {
        card.addEventListener('click', () => {
          const slug = card.dataset.slug;
          const project = PROJECTS.find(p => p.slug === slug);
          if (project) openModal(project);
        });
        card.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            card.click();
          }
        });
      });
    }

    function openModal(project) {
      const overlay = document.createElement('div');
      overlay.className = 'pe-modal-overlay';

      const techHtml = project.techStack.map(t =>
        `<span class="pe-modal-tech-item"><span>${escapeHtml(t.name)}</span> <span class="level">— ${escapeHtml(t.level)}</span></span>`
      ).join('');

      const achievementsHtml = project.achievements.map(a =>
        `<li>${escapeHtml(a)}</li>`
      ).join('');

      const metricsHtml = Object.entries(project.metrics).map(([key, val]) =>
        `<div class="pe-modal-metric">
          <div class="pe-modal-metric-label">${escapeHtml(key)}</div>
          <div class="pe-modal-metric-value">${escapeHtml(val)}</div>
        </div>`
      ).join('');

      const linksHtml = [
        project.githubUrl ? `<a href="${project.githubUrl}" target="_blank" rel="noopener noreferrer" class="pe-modal-link github">GitHub ↗</a>` : '',
        project.liveUrl ? `<a href="${project.liveUrl}" target="_blank" rel="noopener noreferrer" class="pe-modal-link">Live Dashboard ↗</a>` : ''
      ].filter(Boolean).join('');

      const demoNoteHtml = project.demoNote
        ? `<div class="pe-modal-note">ⓘ ${escapeHtml(project.demoNote)}</div>`
        : '';

      overlay.innerHTML = `
        <div class="pe-modal" role="dialog" aria-label="${escapeHtml(project.name)} details">
          <button class="pe-modal-close" aria-label="Close modal">✕</button>
          <div class="pe-modal-header">
            <div class="pe-modal-name">📦 ${escapeHtml(project.name)}</div>
            <span class="pe-card-category" style="display:inline-block;margin-top:0.5rem;">${escapeHtml(project.category.toUpperCase())}</span>
            <div class="pe-modal-desc">${escapeHtml(project.description)}</div>
          </div>

          <div class="pe-modal-section">
            <div class="pe-modal-section-title">Tech Stack</div>
            <div class="pe-modal-tech">${techHtml}</div>
          </div>

          <div class="pe-modal-section">
            <div class="pe-modal-section-title">Metrics</div>
            <div class="pe-modal-metrics">${metricsHtml}</div>
          </div>

          <div class="pe-modal-section">
            <div class="pe-modal-section-title">Key Achievements</div>
            <ul class="pe-modal-achievements">${achievementsHtml}</ul>
          </div>

          ${demoNoteHtml}

          <div class="pe-modal-links">${linksHtml}</div>
        </div>
      `;

      document.body.appendChild(overlay);

      overlay.querySelector('.pe-modal-close').addEventListener('click', () => overlay.remove());
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) overlay.remove();
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && document.body.contains(overlay)) {
          overlay.remove();
        }
      }, { once: true });
    }

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        renderProjects();
      });
    });

    search.addEventListener('input', () => {
      activeQuery = search.value.toLowerCase().trim();
      renderProjects();
    });

    // Online status handled by pwa.js globally

    // Theme persistence
    if (localStorage.getItem('portfolio-theme') === 'retro') {
      document.body.classList.add('theme-retro');
    }

    renderProjects();
  </script>
</body>
</html>
