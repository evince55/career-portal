name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --production=false

      - name: Run tests
        run: npm test

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # wrangler-action is Cloudflare's current, maintained deploy path; the
          # old cloudflare/pages-action@v1 is archived and fails to deploy the
          # functions/ directory on GitHub's forced Node 24 runner.
          command: pages deploy . --project-name=career-portal --branch=master --commit-dirty=true
